<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>G5X MASTER OS - CRM v25</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
 <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
 <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
 <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
 <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/chart.js" crossorigin="anonymous"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>
 <script src="bridge.js"></script>
 <style>
 :root{--gold:#C5A059;--gold-bright:#d4af61;--gold-dim:rgba(197,160,89,.12);--black:#000000;--graphite:#0a0a0a;--graphite-light:#111111;--border:#222222;--border-subtle:#141414;--text-primary:#ffffff;--text-secondary:#a0a0a0;--text-muted:#666666;--danger:#e11d48;--zombie:#7c3aed;--amber:#d97706;--success:#16a34a} *{font-family:'Outfit',sans-serif;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
 body{background-color:var(--black);color:var(--text-primary);margin:0;overflow:hidden;height:100vh;display:flex}
 ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}::-webkit-scrollbar-thumb:hover{background:var(--gold)}
 .grab-scroll{cursor:grab;user-select:none;overflow:auto!important}.grab-scroll:active{cursor:grabbing}
 .lead-card,.partner-card,.bi-card{transition:all .25s cubic-bezier(.16,1,.3,1);border-left:3px solid transparent;cursor:pointer}
 .lead-card:hover,.partner-card:hover,.bi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.6);border-left-color:var(--gold)}
 .lead-card.stalled{border-left-color:var(--danger)!important;animation:pulse-red 2s infinite}
 .lead-card.zombie{border-left-color:var(--zombie)!important;animation:pulse-purple 3s infinite}
 @keyframes pulse-red{0%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}70%{box-shadow:0 0 0 4px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
 @keyframes pulse-purple{0%{box-shadow:0 0 0 0 rgba(168,85,247,.3)}70%{box-shadow:0 0 0 4px rgba(168,85,247,0)}100%{box-shadow:0 0 0 0 rgba(168,85,247,0)}}
 .glass{background:rgba(17,17,17,.85);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border:1px solid var(--border)}
 .wa-btn{background:#25D366;color:white;transition:.2s;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}.wa-btn:hover{background:#128C7E;transform:scale(1.03)}
 input,select,textarea{background:var(--graphite)!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:10px 14px!important;color:var(--text-primary)!important;font-weight:400;width:100%;font-size:14px;transition:border-color .2s}
 input[type="file"]{display:none!important;width:0!important;height:0!important;padding:0!important;border:none!important}
 input:focus,textarea:focus{border-color:var(--gold)!important;outline:none;box-shadow:0 0 0 1px var(--gold-dim)}select{cursor:pointer}
 input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;filter:invert(.7);opacity:.5}
 button{transition:all .15s}button:active{transform:scale(.97)}
 .drop-target{background:var(--gold-dim)!important;border:1.5px dashed var(--gold)!important}
 .kanban-column{background:var(--graphite);border:1px solid var(--border-subtle);border-radius:12px}
 .ob-card{transition:all .2s cubic-bezier(.16,1,.3,1);border-left:3px solid transparent;cursor:pointer}
 .ob-card:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.4);border-left-color:var(--amber)}
 @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.animate-in{animation:fadeIn .25s ease-out}
 .chat-bubble{max-width:85%;padding:14px 20px;border-radius:16px;margin-bottom:12px;font-size:14.5px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;box-shadow:0 4px 12px rgba(0,0,0,.5);position:relative;animation:msg-in .25s ease-out;letter-spacing:.02em}
 .chat-bubble code,.chat-bubble pre{font-family:'JetBrains Mono','Consolas',monospace;background:var(--black);padding:4px 8px;border-radius:6px;font-size:.88em;line-height:1.4;border:1px solid var(--border)}
 .chat-user{background:var(--gold);color:var(--black);margin-left:auto;border-bottom-right-radius:4px;font-weight:600}
 .chat-agent{background:var(--graphite);color:var(--text-primary);border:1px solid var(--border);border-bottom-left-radius:4px} @keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
 .chat-input-glass{background:rgba(17,17,17,.75)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border)!important;border-radius:12px!important}
 .kanban-card-compact{padding:10px 12px;margin-bottom:6px}
 .kanban-card-compact .card-name{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.3}
 .kanban-card-compact .card-company{font-size:11px;color:var(--text-secondary);margin-top:2px}
 .kanban-card-compact .card-value{font-size:12px;color:var(--gold);font-weight:600;margin-top:4px}
 @media(max-width:768px){.sidebar{width:64px!important;padding:6px!important}.sidebar-text{display:none}.main-content{padding:6px!important}}
 </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useRef,useCallback}=React;
const B=window.G5XBridge;

// PARTE 2 — CONSTANTES E HELPERS

const P='g5x_v25_';
const STALL_DAYS=5;

// ── Pipeline Único G5X (Esteira Matriz) ──
// Ambos origens (Intec/Indicação) passam pelos mesmos estágios
const G5X_STAGES=[
 {id:'entrada_triagem',title:'Entrada & Triagem',color:'#8b949e'},
 {id:'diagnostico_agendado',title:'Diagnóstico Agendado',color:'#3b82f6'},
 {id:'viabilidade_tecnica',title:'Viabilidade Técnica',color:'#d29922'},
 {id:'apresentacao_teto',title:'Apresentação de Teto',color:'#8b5cf6'},
 {id:'diligencia_matriz',title:'Diligência Matriz',color:'#ec4899'},
 {id:'credito_na_tela',title:'Crédito na Tela',color:'#3fb950'},
 {id:'perdido_arquivado',title:'Perdido/Arquivado',color:'#f85149'}
];

// ── Origens e Rotas ──
// Indicação (quente) = rota direta com autoridade emprestada
// Demais origens (frias) = cadência automatizada
const ORIGEM_INDICACAO='indicacao';

const ORIGEM_CONFIG={
 [ORIGEM_INDICACAO]:{
  label:'Indicação (Quente)',
  icon:'whatshot',
  color:'#f59e0b',
  action:'Bloquear automações. Abordagem Direta.',
  priority:'Alocação imediata — contato síncrono',
  obrigatorio:['Nome do Indicador','Fantasia da Construtora']
 }
};

// Qualquer lead que NÃO seja indicação é rota fria (cadência)
const isIndicacao = lead => lead?.source===ORIGEM_INDICACAO||lead?.indicacao_origem;

// Estágios operacionais para execução outbound (cadências)
const OB_STAGES=[
 {id:'fila',title:'Fila',color:'#8b949e'},
 {id:'primeiro_contato',title:'1º Contato',color:'#3b82f6'},
 {id:'engajamento',title:'Engajamento',color:'#d29922'},
 {id:'objecao',title:'Objeção',color:'#8b5cf6'},
 {id:'reuniao',title:'Reunião Agendada',color:'#ec4899'},
 {id:'proposta',title:'Proposta',color:'#f59e0b'},
 {id:'convertido',title:'Convertido',color:'#3fb950'},
 {id:'descartado',title:'Descartado',color:'#f85149'}
];

const CADENCE_PIPELINE_STAGES=[
 {id:'c1',title:'C1: WhatsApp Inicial',color:'#25D366',channel:'whatsapp',label:'Contato 1'},
 {id:'c2',title:'C2: Email Contexto',color:'#3b82f6',channel:'email',label:'Contato 2'},
 {id:'c3',title:'C3: Ligação Conexão',color:'#ec4899',channel:'whatsapp',label:'Contato 3'},
 {id:'c4',title:'C4: Follow-up WA',color:'#25D366',channel:'whatsapp',label:'Contato 4'},
 {id:'c5',title:'C5: Email Valor',color:'#3b82f6',channel:'email',label:'Contato 5'},
 {id:'c6',title:'C6: Última Tentativa',color:'#f59e0b',channel:'whatsapp',label:'Contato 6'},
 {id:'c_responded',title:'✅ Respondeu',color:'#3fb950',channel:'any',label:'Engajado'},
];

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const getDaysInStage=ts=>{if(!ts)return 0;return Math.floor((Date.now()-new Date(ts).getTime())/86400000)};
const daysBetween=(a,b)=>Math.floor((new Date(b)-new Date(a))/86400000);
const formatKMB=v=>{const val=Number(v);if(!val||isNaN(val))return'R$ 0';if(val>=1e9)return`R$ ${(val/1e9).toFixed(1).replace('.',',')} bi`;if(val>=1e6)return`R$ ${(val/1e6).toFixed(1).replace('.',',')} M`;if(val>=1e3)return`R$ ${(val/1e3).toFixed(1).replace('.',',')} k`;return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(val)};
const parseMoney=val=>{if(typeof val==='number')return val;if(!val)return 0;let str=val.toString().toLowerCase().replace('r$','').trim().replace(',','.');let m=1;if(str.includes('bi')){m=1e9;str=str.replace('bi','')}else if(str.includes('m')){m=1e6;str=str.replace('m','')}else if(str.includes('k')){m=1e3;str=str.replace('k','')}str=str.replace(/[^0-9.-]/g,'');const r=parseFloat(str)*m;return isNaN(r)?0:r};
const todayStr=()=>new Date().toISOString().split('T')[0];
const fmtDate=d=>{if(!d)return'—';if(d.includes('-'))return d.split('-').reverse().join('/');return d};

// PARTE 3 — APP STATE E INIT

const App=()=>{

// ── Estado principal ──
const[view,setView]=useState('kanban');
const[partners,setPartners]=useState([]);
const[leads,setLeads]=useState([]);
const[actions,setActions]=useState([]);
const[stages,setStages]=useState(G5X_STAGES);
const[obLeads,setObLeads]=useState([]);
const[obGeladeira,setObGeladeira]=useState([]);
const[cadences,setCadences]=useState([]);
const[agentConfig,setAgentConfig]=useState({});
const[knowledge,setKnowledge]=useState({docs:[],urls:[],faq:[],objections:[],texts:[],observations:[]});
const[chatHistory,setChatHistory]=useState([]);
const[chatSending,setChatSending]=useState(false);
const chatInputRef=useRef(null);
const stateRef=useRef(null);
const[activityLog,setActivityLog]=useState([]);
const[agentLog,setAgentLog]=useState([]);
const[dashboard,setDashboard]=useState(null);
const[indicacoes,setIndicacoes]=useState([]);

// ── UI State ──
const[loading,setLoading]=useState(true);
const[pFilter,setPFilter]=useState('All');
const[search,setSearch]=useState('');
const[modal,setModal]=useState({type:null,data:null});
const[obSubView,setObSubView]=useState('pipeline');
const[agentSubView,setAgentSubView]=useState('config');
const[knowledgeSubView,setKnowledgeSubView]=useState('docs');
const[editingCadence,setEditingCadence]=useState(null);

const contentRef=useRef(null);
const sidebarRef=useRef(null);
const chatEndRef=useRef(null);

// ── Carregar dados do servidor ──
const loadData=useCallback(async()=>{
  try{
  const[p,l,a,s,ob,gel,cad,ac,kd,cl,al,agl,db,ind]=await Promise.all([
  B.getPartners(),B.getLeads(),B.getTasks(),B.getStages(),
  B.getObLeads(),B.getGeladeira(),B.getCadences(),
  B.getAgentConfig(),
  Promise.all([B.getKnowledgeDocs(),B.getKnowledgeUrls(),B.getKnowledgeFaq(),B.getKnowledgeObjections(),B.getKnowledgeTexts(),B.getObservations()]),
  B.getChatHistory(),B.getActivityLog(50),B.getAgentLog(50),B.getDashboard(),
  B.getIndications()
  ]);
  setPartners(p||[]);
  setLeads(l||[]);
  setActions(a||[]);
  setStages(s&&s.length?s:G5X_STAGES);
  setIndicacoes(ind||[]);
  // Compatibilidade: leads com status antigos recebem status do novo pipeline
  const stageMap={'novo':'entrada_triagem','apresentacao':'apresentacao_teto','negociacao':'diligencia_matriz',
    'tramite_tecnico':'viabilidade_tecnica','brasilia':'diligencia_matriz','sucesso':'credito_na_tela','recusado':'perdido_arquivado'};
  setLeads(prev=>prev.map(l=>({
    ...l,
    status: stageMap[l.status]||l.status||'entrada_triagem',
    indicacao_origem: isIndicacao(l) ? l.indicacao_origem||{indicador:l.main_pain||'Indicador'} : undefined
  })));
 setObLeads(ob||[]);
 setObGeladeira(gel||[]);
 setCadences(cad||[]);
 setAgentConfig(ac||{});
 setKnowledge({docs:kd[0]||[],urls:kd[1]||[],faq:kd[2]||[],objections:kd[3]||[],texts:kd[4]||[],observations:kd[5]||[]});
 setChatHistory(cl||[]);
 setActivityLog(al||[]);
 setAgentLog(agl||[]);
 setDashboard(db);
 setLoading(false);
 }catch(err){
 console.error('Erro ao carregar dados:',err);
 setLoading(false);
 }
},[]);

useEffect(()=>{loadData()},[loadData]);

// Auto-refresh a cada 30s
useEffect(()=>{
 const iv=setInterval(loadData,30000);
 return()=>clearInterval(iv);
},[loadData]);

  // Rolagem automática do chat
  useEffect(() => {
    if (view === 'chat' && chatEndRef.current) {
      chatEndRef.current.scrollIntoView({
        behavior: 'smooth'
      });
    }
  }, [chatHistory, view]);

  // Polling de status do motor quando ativo na visualização do agente
  useEffect(() => {
    if (view === 'agent' && agentSubView === 'engine') {
      fetchEngineStatus();
      const iv = setInterval(fetchEngineStatus, 10000);
      return () => clearInterval(iv);
    }
  }, [view, agentSubView]);

// ── Grab scroll ──
const setupGrabScroll=ref=>{
 let isDown=false,sx,sy,sl,st;
 return{
 onMouseDown:e=>{const el=ref.current;if(!el)return;isDown=true;sx=e.pageX-el.offsetLeft;sy=e.pageY-el.offsetTop;sl=el.scrollLeft;st=el.scrollTop;el.style.cursor='grabbing'},
 onMouseMove:e=>{const el=ref.current;if(!el||!isDown)return;e.preventDefault();el.scrollLeft=sl-(e.pageX-el.offsetLeft-sx)*1.5;el.scrollTop=st-(e.pageY-el.offsetTop-sy)*1.5},
 onMouseUp:()=>{isDown=false;if(ref.current)ref.current.style.cursor='grab'},
 onMouseLeave:()=>{isDown=false;if(ref.current)ref.current.style.cursor='grab'}
 };
};

const gsContent=setupGrabScroll(contentRef);
const gsSidebar=setupGrabScroll(sidebarRef);

// ── Ações CRM ──
const openWA=(phone)=>{if(!phone){alert('Telefone não cadastrado.');return}window.open(`https://wa.me/${phone.replace(/\D/g,'')}`,'_blank')};

const saveLead=async(data)=>{
 if(data.id){await B.updateLead(data.id,data)}
 else{await B.createLead(data)}
 await loadData();
};

const deleteLead=async(id)=>{
 if(!confirm('Deletar este lead?'))return;
 await B.deleteLead(id);
 await loadData();
};

const moveLead=async(id,status)=>{
 await B.moveLeadStage(id,status);
 await loadData();
};

  const handleObLeadDrop = async (leadId, targetStageId) => {
    try {
      const lead = obLeads.find(l => l.id === leadId);
      if (!lead) return;
      let updateData = {};
      if (targetStageId === 'fila') {
        updateData = { status: 'fila', paused: false };
      } else if (targetStageId.startsWith('step_')) {
        const stepNum = parseInt(targetStageId.split('_')[1], 10);
        updateData = { status: 'execucao', cadencia_step: stepNum, paused: false };
      } else if (targetStageId === 'objecao') {
        updateData = { status: 'objecao', paused: false };
      } else if (targetStageId === 'resposto') {
        await B.replyObLead(leadId);
        await loadData();
        return;
      } else if (targetStageId === 'pausado') {
        updateData = { paused: true };
      }
      await B.updateObLead(leadId, updateData);
      await loadData();
    } catch (err) {
      console.error('Erro ao mover lead outbound:', err);
    }
  };

const savePartner=async(data)=>{
 if(data.id){await B.updatePartner(data.id,data)}
 else{await B.createPartner(data)}
 await loadData();
};

const deletePartner=async(id)=>{
 if(!confirm('Excluir parceiro?'))return;
 await B.deletePartner(id);
 setModal({type:null});
 await loadData();
};

const saveTask=async(data)=>{
 await B.createTask(data);
 await loadData();
};

const toggleTask=async(task)=>{
 await B.updateTask(task.id,{done:!task.done});
 await loadData();
};

// PARTE 4 — AÇÕES OUTBOUND E CHAT

const addToOutbound=async(crmLead)=>{
 const cadencia=cadences.find(c=>c.status==='Ativa');
 if(!cadencia){alert('Nenhuma cadência ativa. Crie uma primeiro.');return}
 const newOb={
 crm_lead_id:crmLead.id,name:crmLead.name,company:crmLead.company,
 phone:crmLead.phone,email:crmLead.email,linkedin_url:crmLead.linkedin_url,
 job_title:crmLead.job_title,value:crmLead.value,partner_id:crmLead.partner_id,
 status:'fila',last_contact:todayStr(),cadencia_step:1,
 cadencia_id:cadencia.id,channel:'whatsapp',paused:false
 };
 await B.createObLead(newOb);
 await loadData();
};

const moveObLead=async(id,newStatus)=>{
 await B.updateObLead(id,{status:newStatus,last_contact:todayStr()});
 await B.addObHistory(id,{action_text:`Movido para ${OB_STAGES.find(s=>s.id===newStatus)?.title||newStatus}`,channel:'sistema'});
 await loadData();
};

const togglePauseOb=async(id,paused)=>{
 await B.updateObLead(id,{paused:!paused});
 await loadData();
};

const reactivateFromGeladeira=async(g)=>{
 await B.deleteGeladeira(g.id);
 const cadencia=cadences.find(c=>c.status==='Ativa');
 await B.createObLead({
 crm_lead_id:g.crm_lead_id,name:g.name,company:g.company,
 phone:g.phone,email:g.email,linkedin_url:g.linkedin_url,
 status:'engajamento',last_contact:todayStr(),cadencia_step:1,
 cadencia_id:cadencia?.id,channel:'whatsapp',paused:false
 });
 await loadData();
};

const discardFromGeladeira=async(id)=>{
 await B.deleteGeladeira(id);
 await loadData();
};

// CADÊNCIAS
const saveCadence=async(data)=>{
 if(data.id){await B.updateCadence(data.id,data)}
 else{await B.createCadence(data)}
 setEditingCadence(null);
 await loadData();
};

const deleteCadence=async(id)=>{
 if(!confirm('Excluir cadência?'))return;
 await B.deleteCadence(id);
 await loadData();
};

const duplicateCadence=async(cad)=>{
 const dup={...cad,id:undefined,name:cad.name+' (Cópia)',status:'Rascunho',
 steps:cad.cadence_steps?.map(s=>({...s,id:undefined}))};
 await B.createCadence(dup);
 await loadData();
};

// CHAT
const sendChat=async()=>{
  const el=chatInputRef.current;
  if(!el||!el.value.trim()||chatSending)return;
  const msg=el.value.trim();
  el.value='';
  el.focus();
  setChatSending(true);
  setChatHistory(prev=>[...prev,{id:Date.now().toString(),role:'user',content:msg,ts:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}]);
  try{
  const response=await B.sendChatMessage(msg);
  if(response)setChatHistory(prev=>[...prev,response]);
  }catch(e){
  setChatHistory(prev=>[...prev,{id:Date.now().toString(),role:'agent',content:'❌ Erro de conexão com a IA. Verifique o servidor.',ts:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}]);
  }finally{
  setChatSending(false);
  setTimeout(()=>{
  if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:'smooth'});
  },100);
  }
 };

// IMPORT LISTA FRIA
const importLeadFile=async(file,target)=>{
 const fd=new FormData();
 fd.append('file',file);
 fd.append('target',target||'crm');
 const activeCad=cadences.find(c=>c.status==='Ativa');
 if(activeCad)fd.append('cadencia_id',activeCad.id);
 const result=await B.importLeads(fd);
 if(result&&result.count){
 alert(`✅ ${result.count} leads importados com sucesso!`);
 await loadData();
 }else{
 alert('❌ Erro ao importar. Verifique o formato do arquivo.');
 }
};

// KNOWLEDGE
const uploadKnowledgeFile=async(file)=>{
 const fd=new FormData();
 fd.append('file',file);
 await B.uploadKnowledge(fd);
 await loadData();
};

const addKnowledgeUrl=async(url)=>{
 await B.addKnowledgeUrl({url,title:url});
 await loadData();
};

const saveFaq=async(data)=>{
 if(data.id){await B.updateKnowledgeFaq(data.id,data)}
 else{await B.addKnowledgeFaq(data)}
 await loadData();
};

const saveObjection=async(data)=>{
 if(data.id){await B.updateKnowledgeObjection(data.id,data)}
 else{await B.addKnowledgeObjection(data)}
 await loadData();
};

const saveText=async(data)=>{
 if(data.id){await B.updateKnowledgeText(data.id,data)}
 else{await B.addKnowledgeText(data)}
 await loadData();
};

// AGENT CONFIG
const saveAgentConfig=async(data)=>{
 await B.updateAgentConfig(data);
 await loadData();
};

// STATS
const stats=useMemo(()=>{
 const won=leads.filter(l=>l.status==='credito_na_tela');
 const revenue=won.reduce((a,b)=>a+Number(b.value||0),0);
 const net=won.reduce((acc,l)=>{
 if(l.maiti_comm&&Number(l.maiti_comm)>0)return acc+Number(l.maiti_comm);
 return acc+(Number(l.value||0)-Number(l.partner_comm||0));
 },0);
 const pipe=leads.filter(l=>!['credito_na_tela','perdido_arquivado'].includes(l.status)).reduce((a,b)=>a+Number(b.value||0),0);
 return{revenue,net,pipe};
},[leads]);

const ObPipeline=()=>{
  const {contentRef, gsContent, obLeads, cadences, handleObLeadDrop}=stateRef.current;
  const activeCadence = cadences.find(c => c.status === 'Ativa');
  let obStages = [];

  if (activeCadence && activeCadence.cadence_steps && activeCadence.cadence_steps.length > 0) {
    obStages.push({ id: 'fila', title: 'Fila', color: '#8b949e', filter: l => l.status === 'fila' && !l.paused });
    const colors = ['#3b82f6', '#d29922', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#06b6d4'];
    activeCadence.cadence_steps.forEach((step, idx) => {
      const stepNum = step.step_number;
      obStages.push({
        id: `step_${stepNum}`,
        title: `Passo ${stepNum} (${step.channel})`,
        color: colors[idx % colors.length],
        filter: l => l.status !== 'fila' && l.status !== 'objecao' && l.status !== 'resposto' && l.status !== 'convertido' && l.status !== 'descartado' && l.cadencia_step === stepNum && !l.paused
      });
    });
    obStages.push({ id: 'objecao', title: 'Objeção', color: '#ef4444', filter: l => l.status === 'objecao' && !l.paused });
    obStages.push({ id: 'resposto', title: 'Resposto / Convertido', color: '#10b981', filter: l => (l.status === 'resposto' || l.status === 'convertido') && !l.paused });
    obStages.push({ id: 'pausado', title: 'Pausados / Congelados', color: '#6e7681', filter: l => l.paused || l.status === 'descartado' });
  } else {
    obStages = [
      { id: 'fila', title: 'Fila', color: '#8b949e', filter: l => l.status === 'fila' },
      { id: 'ativo', title: 'Em Execução', color: '#3b82f6', filter: l => l.status !== 'fila' && l.status !== 'objecao' && l.status !== 'resposto' && l.status !== 'convertido' && l.status !== 'descartado' && !l.paused },
      { id: 'objecao', title: 'Objeção', color: '#ef4444', filter: l => l.status === 'objecao' },
      { id: 'resposto', title: 'Respostos', color: '#10b981', filter: l => l.status === 'resposto' || l.status === 'convertido' },
      { id: 'pausado', title: 'Pausados', color: '#6e7681', filter: l => l.paused || l.status === 'descartado' }
    ];
  }

  return (
    <div className="grab-scroll" ref={contentRef} onMouseDown={gsContent.onMouseDown} onMouseMove={gsContent.onMouseMove}
      onMouseUp={gsContent.onMouseUp} onMouseLeave={gsContent.onMouseLeave}
      style={{display:'flex', gap:12, padding:'16px 24px', overflowX:'auto', overflowY:'hidden', flex:1}}>
      {obStages.map(s => (
        <ObPipelineColumn 
          key={s.id} 
          stage={s} 
          leadsList={obLeads.filter(s.filter)} 
          onDrop={handleObLeadDrop}
        />
      ))}
    </div>
  );
};

const CadenceEditor=({cadence,onSave,onCancel})=>{
 const[name,setName]=useState(cadence?.name||'');
 const[desc,setDesc]=useState(cadence?.description||'');
 const[steps,setSteps]=useState(cadence?.cadence_steps||[{step_number:1,channel:'whatsapp',timing_days:0,scheduled_time:'09:00',message_template:'',label:'Passo 1'}]);
 const addStep=()=>setSteps([...steps,{step_number:steps.length+1,channel:'whatsapp',timing_days:1,scheduled_time:'09:00',message_template:'',label:`Passo ${steps.length+1}`}]);
 const removeStep=i=>setSteps(steps.filter((_,idx)=>idx!==i));
 const updateStep=(i,key,val)=>{const n=[...steps];n[i]={...n[i],[key]:val};setSteps(n)};
 return(
 <div style={{padding:24,maxWidth:700}}>
 <h3 style={{color:'white',margin:'0 0 16px'}}>{cadence?.id?'Editar':'Nova'} Cadência</h3>
 <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nome da cadência" style={{marginBottom:8}}/>
 <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descrição" style={{marginBottom:16}}/>
 {steps.map((s,i)=>(
 <div key={i} style={{background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',borderRadius:10,padding:12,marginBottom:8}}>
 <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
 <span style={{color:'var(--gold)',fontWeight:700,fontSize:13}}>#{i+1}</span>
 <input value={s.label||''} onChange={e=>updateStep(i,'label',e.target.value)} placeholder="Rótulo" style={{flex:1,margin:0}}/>
 <select value={s.channel} onChange={e=>updateStep(i,'channel',e.target.value)} style={{width:120}}>
 <option value="whatsapp">WhatsApp</option><option value="email">Email</option><option value="linkedin">LinkedIn</option>
 </select>
 <input type="number" value={s.timing_days} onChange={e=>updateStep(i,'timing_days',parseInt(e.target.value)||0)} placeholder="Dias" style={{width:70}}/>
 <button onClick={()=>removeStep(i)} style={{background:'rgba(239,68,68,.15)',color:'#ef4444',border:'none',padding:'6px 10px',borderRadius:6,cursor:'pointer',fontSize:12}}>✕</button>
 </div>
 <textarea value={s.message_template||''} onChange={e=>updateStep(i,'message_template',e.target.value)} placeholder="Template. Use {{firstName}}, {{company}}, {{pain}}" rows={3}/>
 </div>
 ))}
 <div style={{display:'flex',gap:8,marginTop:12}}>
 <button onClick={addStep} style={{background:'rgba(197,160,89,.15)',color:'var(--gold)',border:'1px solid rgba(197,160,89,.3)',padding:'8px 16px',borderRadius:8,fontWeight:600,fontSize:13,cursor:'pointer'}}>+ Adicionar Passo</button>
 <div style={{flex:1}}/>
 <button onClick={onCancel} style={{background:'transparent',color:'#8b949e',border:'1px solid var(--border)',padding:'8px 16px',borderRadius:8,fontSize:13,cursor:'pointer'}}>Cancelar</button>
 <button onClick={()=>onSave({id:cadence?.id,name,description:desc,status:cadence?.status||'Rascunho',steps})} style={{background:'var(--gold)',color:'black',border:'none',padding:'8px 20px',borderRadius:8,fontWeight:700,fontSize:13,cursor:'pointer'}}>Salvar</button>
 </div>
 </div>
 );
};

};
