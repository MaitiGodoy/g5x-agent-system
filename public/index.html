 input,select,textarea{background:var(--graphite)!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:10px 14px!important;color:var(--text-primary)!important;font-weight:400;width:100%;font-size:14px;transition:border-color .2s}

 .chat-input-glass{background:rgba(17,17,17,.75)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border)!important;border-radius:12px!important}
 .kanban-card-compact{padding:10px 12px;margin-bottom:6px}

 .kanban-card-compact .card-value{font-size:12px;color:var(--gold);font-weight:600;margin-top:4px}

<body>
<div id="root"></div>
<script>const {
  useState,
  useEffect,
  useMemo,
  useRef,
  useCallback
} = React;
const B = window.G5XBridge;

// PARTE 2 — CONSTANTES E HELPERS

const P = 'g5x_v25_';
const STALL_DAYS = 5;

// ── Pipeline Único G5X (Esteira Matriz) ──
// Ambos origens (Intec/Indicação) passam pelos mesmos estágios
const G5X_STAGES = [{
  id: 'entrada_triagem',
  title: 'Entrada & Triagem',
  color: '#8b949e'
}, {
  id: 'diagnostico_agendado',
  title: 'Diagnóstico Agendado',
  color: '#3b82f6'
}, {
  id: 'viabilidade_tecnica',
  title: 'Viabilidade Técnica',
  color: '#d29922'
}, {
  id: 'apresentacao_teto',
  title: 'Apresentação de Teto',
  color: '#8b5cf6'
}, {
  id: 'diligencia_matriz',
  title: 'Diligência Matriz',
  color: '#ec4899'
}, {
  id: 'credito_na_tela',
  title: 'Crédito na Tela',
  color: '#3fb950'
}, {
  id: 'perdido_arquivado',
  title: 'Perdido/Arquivado',
  color: '#f85149'
}];

// ── Origens e Rotas ──
// Indicação (quente) = rota direta com autoridade emprestada
// Demais origens (frias) = cadência automatizada
const ORIGEM_INDICACAO = 'indicacao';
const ORIGEM_CONFIG = {
  [ORIGEM_INDICACAO]: {
    label: 'Indicação (Quente)',
    icon: 'whatshot',
    color: '#f59e0b',
    action: 'Bloquear automações. Abordagem Direta.',
    priority: 'Alocação imediata — contato síncrono',
    obrigatorio: ['Nome do Indicador', 'Fantasia da Construtora']
  }
};

// Qualquer lead que NÃO seja indicação é rota fria (cadência)
const isIndicacao = lead => lead?.source === ORIGEM_INDICACAO || lead?.indicacao_origem;

// Estágios operacionais para execução outbound (cadências)
const OB_STAGES = [{
  id: 'fila',
  title: 'Fila',
  color: '#8b949e'
}, {
  id: 'primeiro_contato',
  title: '1º Contato',
  color: '#3b82f6'
}, {
  id: 'engajamento',
  title: 'Engajamento',
  color: '#d29922'
}, {
  id: 'objecao',
  title: 'Objeção',
  color: '#8b5cf6'
}, {
  id: 'reuniao',
  title: 'Reunião Agendada',
  color: '#ec4899'
}, {
  id: 'proposta',
  title: 'Proposta',
  color: '#f59e0b'
}, {
  id: 'convertido',
  title: 'Convertido',
  color: '#3fb950'
}, {
  id: 'descartado',
  title: 'Descartado',
  color: '#f85149'
}];
const CADENCE_PIPELINE_STAGES = [{
  id: 'c1',
  title: 'C1: WhatsApp Inicial',
  color: '#25D366',
  channel: 'whatsapp',
  label: 'Contato 1'
}, {
  id: 'c2',
  title: 'C2: Email Contexto',
  color: '#3b82f6',
  channel: 'email',
  label: 'Contato 2'
}, {
  id: 'c3',
  title: 'C3: Ligação Conexão',
  color: '#ec4899',
  channel: 'whatsapp',
  label: 'Contato 3'
}, {
  id: 'c4',
  title: 'C4: Follow-up WA',
  color: '#25D366',
  channel: 'whatsapp',
  label: 'Contato 4'
}, {
  id: 'c5',
  title: 'C5: Email Valor',
  color: '#3b82f6',
  channel: 'email',
  label: 'Contato 5'
}, {
  id: 'c6',
  title: 'C6: Última Tentativa',
  color: '#f59e0b',
  channel: 'whatsapp',
  label: 'Contato 6'
}, {
  id: 'c_responded',
  title: '✅ Respondeu',
  color: '#3fb950',
  channel: 'any',
  label: 'Engajado'
}];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const getDaysInStage = ts => {
  if (!ts) return 0;
  return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
};
const daysBetween = (a, b) => Math.floor((new Date(b) - new Date(a)) / 86400000);
const formatKMB = v => {
  const val = Number(v);
  if (!val || isNaN(val)) return 'R$ 0';
  if (val >= 1e9) return `R$ ${(val / 1e9).toFixed(1).replace('.', ',')} bi`;
  if (val >= 1e6) return `R$ ${(val / 1e6).toFixed(1).replace('.', ',')} M`;
  if (val >= 1e3) return `R$ ${(val / 1e3).toFixed(1).replace('.', ',')} k`;
  return new Intl.NumberFormat('pt-BR', {
    style: 'currency',
    currency: 'BRL',
    maximumFractionDigits: 0
  }).format(val);
};
const parseMoney = val => {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  let str = val.toString().toLowerCase().replace('r$', '').trim().replace(',', '.');
  let m = 1;
  if (str.includes('bi')) {
    m = 1e9;
    str = str.replace('bi', '');
  } else if (str.includes('m')) {
    m = 1e6;
    str = str.replace('m', '');
  } else if (str.includes('k')) {
    m = 1e3;
    str = str.replace('k', '');
  }
  str = str.replace(/[^0-9.-]/g, '');
  const r = parseFloat(str) * m;
  return isNaN(r) ? 0 : r;
};
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate = d => {
  if (!d) return '—';
  if (d.includes('-')) return d.split('-').reverse().join('/');
  return d;
};

// PARTE 3 — APP STATE E INIT

const App = () => {
  // ── Estado principal ──
  const [view, setView] = useState('kanban');
  const [partners, setPartners] = useState([]);
  const [leads, setLeads] = useState([]);
  const [actions, setActions] = useState([]);
  const [stages, setStages] = useState(G5X_STAGES);
  const [obLeads, setObLeads] = useState([]);
  const [obGeladeira, setObGeladeira] = useState([]);
  const [cadences, setCadences] = useState([]);
  const [agentConfig, setAgentConfig] = useState({});
  const [knowledge, setKnowledge] = useState({
    docs: [],
    urls: [],
    faq: [],
    objections: [],
    texts: [],
    observations: []
  });
  const [chatHistory, setChatHistory] = useState([]);
  const [chatSending, setChatSending] = useState(false);
  const chatInputRef = useRef(null);
  const stateRef = useRef(null);
  const [activityLog, setActivityLog] = useState([]);
  const [agentLog, setAgentLog] = useState([]);
  const [dashboard, setDashboard] = useState(null);
  const [indicacoes, setIndicacoes] = useState([]);

  // ── UI State ──
  const [loading, setLoading] = useState(true);
  const [pFilter, setPFilter] = useState('All');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState({
    type: null,
    data: null
  });
  const [obSubView, setObSubView] = useState('pipeline');
  const [agentSubView, setAgentSubView] = useState('config');
  const [knowledgeSubView, setKnowledgeSubView] = useState('docs');
  const [editingCadence, setEditingCadence] = useState(null);
  const contentRef = useRef(null);
  const sidebarRef = useRef(null);
  const chatEndRef = useRef(null);

  // ── Carregar dados do servidor ──
  const loadData = useCallback(async () => {
    try {
      const [p, l, a, s, ob, gel, cad, ac, kd, cl, al, agl, db, ind] = await Promise.all([B.getPartners(), B.getLeads(), B.getTasks(), B.getStages(), B.getObLeads(), B.getGeladeira(), B.getCadences(), B.getAgentConfig(), Promise.all([B.getKnowledgeDocs(), B.getKnowledgeUrls(), B.getKnowledgeFaq(), B.getKnowledgeObjections(), B.getKnowledgeTexts(), B.getObservations()]), B.getChatHistory(), B.getActivityLog(50), B.getAgentLog(50), B.getDashboard(), B.getIndications()]);
      setPartners(p || []);
      setLeads(l || []);
      setActions(a || []);
      setStages(s && s.length ? s : G5X_STAGES);
      setIndicacoes(ind || []);
      // Compatibilidade: leads com status antigos recebem status do novo pipeline
      const stageMap = {
        'novo': 'entrada_triagem',
        'apresentacao': 'apresentacao_teto',
        'negociacao': 'diligencia_matriz',
        'tramite_tecnico': 'viabilidade_tecnica',
        'brasilia': 'diligencia_matriz',
        'sucesso': 'credito_na_tela',
        'recusado': 'perdido_arquivado'
      };
      setLeads(prev => prev.map(l => ({
        ...l,
        status: stageMap[l.status] || l.status || 'entrada_triagem',
        indicacao_origem: isIndicacao(l) ? l.indicacao_origem || {
          indicador: l.main_pain || 'Indicador'
        } : undefined
      })));
      setObLeads(ob || []);
      setObGeladeira(gel || []);
      setCadences(cad || []);
      setAgentConfig(ac || {});
      setKnowledge({
        docs: kd[0] || [],
        urls: kd[1] || [],
        faq: kd[2] || [],
        objections: kd[3] || [],
        texts: kd[4] || [],
        observations: kd[5] || []
      });
      setChatHistory(cl || []);
      setActivityLog(al || []);
      setAgentLog(agl || []);
      setDashboard(db);
      setLoading(false);
    } catch (err) {
      console.error('Erro ao carregar dados:', err);
      setLoading(false);
    }
  }, []);
  useEffect(() => {
    loadData();
  }, [loadData]);

  // Auto-refresh a cada 30s
  useEffect(() => {
    const iv = setInterval(loadData, 30000);
    return () => clearInterval(iv);
  }, [loadData]);

  // Rolagem automática do chat
  useEffect(() => {
    if (view === 'chat' && chatEndRef.current) {
      chatEndRef.current.scrollIntoView({
        behavior: 'smooth'
      });
    }
  }, [chatHistory, view]);

  // Polling de status do motor quando ativo na visualização do agente
  useEffect(() => {
    if (view === 'agent' && agentSubView === 'engine') {
      fetchEngineStatus();
      const iv = setInterval(fetchEngineStatus, 10000);
      return () => clearInterval(iv);
    }
  }, [view, agentSubView]);

  // ── Grab scroll ──
  const setupGrabScroll = ref => {
    let isDown = false,
      sx,
      sy,
      sl,
      st;
    return {
      onMouseDown: e => {
        const el = ref.current;
        if (!el) return;
        isDown = true;
        sx = e.pageX - el.offsetLeft;
        sy = e.pageY - el.offsetTop;
        sl = el.scrollLeft;
        st = el.scrollTop;
        el.style.cursor = 'grabbing';
      },
      onMouseMove: e => {
        const el = ref.current;
        if (!el || !isDown) return;
        e.preventDefault();
        el.scrollLeft = sl - (e.pageX - el.offsetLeft - sx) * 1.5;
        el.scrollTop = st - (e.pageY - el.offsetTop - sy) * 1.5;
      },
      onMouseUp: () => {
        isDown = false;
        if (ref.current) ref.current.style.cursor = 'grab';
      },
      onMouseLeave: () => {
        isDown = false;
        if (ref.current) ref.current.style.cursor = 'grab';
      }
    };
  };
  const gsContent = setupGrabScroll(contentRef);
  const gsSidebar = setupGrabScroll(sidebarRef);

  // ── Ações CRM ──
  const openWA = phone => {
    if (!phone) {
      alert('Telefone não cadastrado.');
      return;
    }
    window.open(`https://wa.me/${phone.replace(/\D/g, '')}`, '_blank');
  };
  const saveLead = async data => {
    if (data.id) {
      await B.updateLead(data.id, data);
    } else {
      await B.createLead(data);
    }
    await loadData();
  };
  const deleteLead = async id => {
    if (!confirm('Deletar este lead?')) return;
    await B.deleteLead(id);
    await loadData();
  };
  const moveLead = async (id, status) => {
    await B.moveLeadStage(id, status);
    await loadData();
  };
  const handleObLeadDrop = async (leadId, targetStageId) => {
    try {
      const lead = obLeads.find(l => l.id === leadId);
      if (!lead) return;
      let updateData = {};
      if (targetStageId === 'fila') {
        updateData = {
          status: 'fila',
          paused: false
        };
      } else if (targetStageId.startsWith('step_')) {
        const stepNum = parseInt(targetStageId.split('_')[1], 10);
        updateData = {
          status: 'execucao',
          cadencia_step: stepNum,
          paused: false
        };
      } else if (targetStageId === 'objecao') {
        updateData = {
          status: 'objecao',
          paused: false
        };
      } else if (targetStageId === 'resposto') {
        await B.replyObLead(leadId);
        await loadData();
        return;
      } else if (targetStageId === 'pausado') {
        updateData = {
          paused: true
        };
      }
      await B.updateObLead(leadId, updateData);
      await loadData();
    } catch (err) {
      console.error('Erro ao mover lead outbound:', err);
    }
  };
  const savePartner = async data => {
    if (data.id) {
      await B.updatePartner(data.id, data);
    } else {
      await B.createPartner(data);
    }
    await loadData();
  };
  const deletePartner = async id => {
    if (!confirm('Excluir parceiro?')) return;
    await B.deletePartner(id);
    setModal({
      type: null
    });
    await loadData();
  };
  const saveTask = async data => {
    await B.createTask(data);
    await loadData();
  };
  const toggleTask = async task => {
    await B.updateTask(task.id, {
      done: !task.done
    });
    await loadData();
  };

  // PARTE 4 — AÇÕES OUTBOUND E CHAT

  const addToOutbound = async crmLead => {
    const cadencia = cadences.find(c => c.status === 'Ativa');
    if (!cadencia) {
      alert('Nenhuma cadência ativa. Crie uma primeiro.');
      return;
    }
    const newOb = {
      crm_lead_id: crmLead.id,
      name: crmLead.name,
      company: crmLead.company,
      phone: crmLead.phone,
      email: crmLead.email,
      linkedin_url: crmLead.linkedin_url,
      job_title: crmLead.job_title,
      value: crmLead.value,
      partner_id: crmLead.partner_id,
      status: 'fila',
      last_contact: todayStr(),
      cadencia_step: 1,
      cadencia_id: cadencia.id,
      channel: 'whatsapp',
      paused: false
    };
    await B.createObLead(newOb);
    await loadData();
  };
  const moveObLead = async (id, newStatus) => {
    await B.updateObLead(id, {
      status: newStatus,
      last_contact: todayStr()
    });
    await B.addObHistory(id, {
      action_text: `Movido para ${OB_STAGES.find(s => s.id === newStatus)?.title || newStatus}`,
      channel: 'sistema'
    });
    await loadData();
  };
  const togglePauseOb = async (id, paused) => {
    await B.updateObLead(id, {
      paused: !paused
    });
    await loadData();
  };
  const reactivateFromGeladeira = async g => {
    await B.deleteGeladeira(g.id);
    const cadencia = cadences.find(c => c.status === 'Ativa');
    await B.createObLead({
      crm_lead_id: g.crm_lead_id,
      name: g.name,
      company: g.company,
      phone: g.phone,
      email: g.email,
      linkedin_url: g.linkedin_url,
      status: 'engajamento',
      last_contact: todayStr(),
      cadencia_step: 1,
      cadencia_id: cadencia?.id,
      channel: 'whatsapp',
      paused: false
    });
    await loadData();
  };
  const discardFromGeladeira = async id => {
    await B.deleteGeladeira(id);
    await loadData();
  };

  // CADÊNCIAS
  const saveCadence = async data => {
    if (data.id) {
      await B.updateCadence(data.id, data);
    } else {
      await B.createCadence(data);
    }
    setEditingCadence(null);
    await loadData();
  };
  const deleteCadence = async id => {
    if (!confirm('Excluir cadência?')) return;
    await B.deleteCadence(id);
    await loadData();
  };
  const duplicateCadence = async cad => {
    const dup = {
      ...cad,
      id: undefined,
